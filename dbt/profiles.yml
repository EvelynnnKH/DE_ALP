financial_analytics: 
  outputs:
    bigquery:
      type: bigquery
      method: service-account
      project: YOUR_BQ_PROJECT_NAME # Ganti dengan ID Project GCP kalian
      dataset: raw
      keyfile: /opt/airflow/credentials/service-account.json
      threads: 4
      timeout_seconds: 300
      location: asia-southeast2
  target: bigquery