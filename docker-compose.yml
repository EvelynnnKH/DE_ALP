version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow.Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'FB1Kyv7R4_839Sp_S_X639SL_X4=G639SL_X4=G639SL_X4='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__LOGGING_LEVEL: INFO
    # Konfigurasi Path dbt & GCP Service Account
    DBT_PROFILES_DIR: /opt/airflow/dbt
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/service-account.json
  volumes:
    - ./container/dags:/opt/airflow/dags
    - ./container/logs:/opt/airflow/logs
    - ./container/config:/opt/airflow/config
    - ./dbt:/opt/airflow/dbt
    - ./credentials:/opt/airflow/credentials
    - ./ingestion:/opt/airflow/ingestion
  dependencies:
    postgres:
      condition: service_healthy

services:
  # 1. Metadata Database untuk Airflow
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # 2. Airflow Webserver (UI)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  # 3. Airflow Scheduler (Mesin Orkestrasi)
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # 4. Metabase (BI Tool)
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: airflow
      MB_DB_PASS: airflow
      MB_DB_HOST: postgres
    restart: always